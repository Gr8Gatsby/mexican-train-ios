<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    LAYER 4 — SMOKE
    Cream smoke puffs rising and trailing back from the locomotive's smokestack
    (stack mouth ≈ (800, 332)). Big enough to fill the upper-left of the icon
    and balance the heavy train at the bottom.
    Transparent background.
  -->
  <defs>
    <radialGradient id="smokePuff" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFBEE" stop-opacity="0.96"/>
      <stop offset="70%" stop-color="#F4EAD5" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#EAD5A8" stop-opacity="0.30"/>
    </radialGradient>
    <radialGradient id="smokePuffSoft" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFBEE" stop-opacity="0.78"/>
      <stop offset="70%" stop-color="#F4EAD5" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#EAD5A8" stop-opacity="0.14"/>
    </radialGradient>
  </defs>

  <!-- Right at the stack mouth (small, dense puff) -->
  <circle cx="800" cy="310" r="26" fill="url(#smokePuff)" opacity="0.92"/>

  <!-- Rising and arcing back to the left -->
  <circle cx="760" cy="260" r="42" fill="url(#smokePuff)"/>
  <circle cx="690" cy="210" r="62" fill="url(#smokePuff)"/>
  <circle cx="600" cy="170" r="82" fill="url(#smokePuff)"/>
  <circle cx="490" cy="150" r="92" fill="url(#smokePuff)"/>
  <circle cx="370" cy="170" r="78" fill="url(#smokePuff)"/>
  <circle cx="260" cy="215" r="60" fill="url(#smokePuffSoft)"/>
  <circle cx="170" cy="265" r="42" fill="url(#smokePuffSoft)"/>
  <circle cx="100" cy="310" r="30" fill="url(#smokePuffSoft)" opacity="0.7"/>

  <!-- A few smaller "dissipating" puffs around the main cloud for texture -->
  <circle cx="540" cy="100" r="32" fill="url(#smokePuffSoft)" opacity="0.7"/>
  <circle cx="430" cy="220" r="28" fill="url(#smokePuffSoft)" opacity="0.75"/>
  <circle cx="640" cy="120" r="26" fill="url(#smokePuffSoft)" opacity="0.7"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    LAYER 3 — DOMINO TRAIN (the hero)
    Three dominoes as rolling stock, moving right:
      caboose (double-6, 7-stop engine tile)
      → middle boxcar (double-9, 10-stop engine tile)
      → locomotive (double-12, 13-stop engine tile)
    All three Mexican Train engine tiles aboard the same train.
    Transparent background.
  -->
  <defs>
    <linearGradient id="tileFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDFAEE"/>
      <stop offset="55%" stop-color="#F6EBCE"/>
      <stop offset="100%" stop-color="#E8D6A6"/>
    </linearGradient>
    <linearGradient id="brassBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFDBA6"/>
      <stop offset="50%" stop-color="#C2A778"/>
      <stop offset="100%" stop-color="#7B6035"/>
    </linearGradient>
    <radialGradient id="pip" cx="40%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#4A3320"/>
      <stop offset="55%" stop-color="#2A1D10"/>
      <stop offset="100%" stop-color="#15100A"/>
    </radialGradient>
    <linearGradient id="trainBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A2818"/>
      <stop offset="100%" stop-color="#1F1409"/>
    </linearGradient>
    <linearGradient id="brassDome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0DCA8"/>
      <stop offset="60%" stop-color="#C2A778"/>
      <stop offset="100%" stop-color="#7B6035"/>
    </linearGradient>
    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Soft cast shadow under the train -->
  <ellipse cx="490" cy="710" rx="420" ry="14" fill="rgba(0,0,0,0.40)"/>

  <!-- ════════ COUPLERS (drawn first so tiles overlap them) ════════ -->
  <g>
    <!-- Coupler: caboose ↔ middle car -->
    <rect x="280" y="632" width="65" height="12" fill="url(#trainBody)"/>
    <circle cx="280" cy="638" r="7" fill="url(#trainBody)"/>
    <circle cx="345" cy="638" r="7" fill="url(#trainBody)"/>
    <!-- Coupler: middle car ↔ locomotive -->
    <rect x="545" y="632" width="45" height="12" fill="url(#trainBody)"/>
    <circle cx="545" cy="638" r="7" fill="url(#trainBody)"/>
    <circle cx="590" cy="638" r="7" fill="url(#trainBody)"/>
  </g>

  <!-- ════════ CABOOSE — back car (LEFT), shows double-6 ════════ -->
  <g filter="url(#tileShadow)">
    <rect x="80" y="490" width="200" height="110" rx="18" fill="url(#brassBorder)"/>
    <rect x="87" y="497" width="186" height="96" rx="14" fill="url(#tileFace)"/>
    <rect x="93" y="503" width="174" height="84" rx="10" fill="none" stroke="#C2A778" stroke-width="2" opacity="0.55"/>
    <!-- Center divider -->
    <line x1="177" y1="503" x2="177" y2="587" stroke="#9F8048" stroke-width="3"/>
    <line x1="183" y1="503" x2="183" y2="587" stroke="#9F8048" stroke-width="3"/>
    <circle cx="180" cy="503" r="5" fill="url(#brassBorder)"/>
    <circle cx="180" cy="587" r="5" fill="url(#brassBorder)"/>

    <!-- Pips: Double-6 (2 cols × 3 rows per half) -->
    <!-- Left half center (130, 545) -->
    <circle cx="105" cy="515" r="10" fill="url(#pip)"/>
    <circle cx="155" cy="515" r="10" fill="url(#pip)"/>
    <circle cx="105" cy="545" r="10" fill="url(#pip)"/>
    <circle cx="155" cy="545" r="10" fill="url(#pip)"/>
    <circle cx="105" cy="575" r="10" fill="url(#pip)"/>
    <circle cx="155" cy="575" r="10" fill="url(#pip)"/>
    <!-- Right half center (230, 545) -->
    <circle cx="205" cy="515" r="10" fill="url(#pip)"/>
    <circle cx="255" cy="515" r="10" fill="url(#pip)"/>
    <circle cx="205" cy="545" r="10" fill="url(#pip)"/>
    <circle cx="255" cy="545" r="10" fill="url(#pip)"/>
    <circle cx="205" cy="575" r="10" fill="url(#pip)"/>
    <circle cx="255" cy="575" r="10" fill="url(#pip)"/>
  </g>

  <!-- Caboose cupola (the defining caboose feature) -->
  <g>
    <!-- Roof overhang -->
    <path d="M 115 416 L 245 416 L 235 428 L 125 428 Z" fill="url(#trainBody)"/>
    <!-- Cupola box -->
    <rect x="135" y="428" width="90" height="62" rx="4" fill="url(#trainBody)"/>
    <!-- Windows (2 panes) -->
    <rect x="146" y="442" width="32" height="32" rx="2" fill="#EAD5A8" opacity="0.85"/>
    <rect x="182" y="442" width="32" height="32" rx="2" fill="#EAD5A8" opacity="0.85"/>
    <!-- Brass trim along bottom of cupola -->
    <rect x="135" y="481" width="90" height="5" fill="url(#brassDome)" opacity="0.85"/>
  </g>

  <!-- Caboose rear lantern (back-left of caboose) -->
  <g>
    <rect x="66" y="552" width="14" height="22" rx="2" fill="url(#brassDome)"/>
    <rect x="69" y="556" width="8" height="14" fill="#E24B4A"/>
    <line x1="73" y1="552" x2="73" y2="546" stroke="url(#brassDome)" stroke-width="2"/>
  </g>

  <!-- Caboose wheels -->
  <g>
    <!-- Back wheel -->
    <circle cx="120" cy="652" r="28" fill="url(#trainBody)"/>
    <circle cx="120" cy="652" r="28" fill="none" stroke="#5A4028" stroke-width="3"/>
    <circle cx="120" cy="652" r="10" fill="url(#brassDome)"/>
    <line x1="120" y1="652" x2="120" y2="628" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="120" y1="652" x2="120" y2="676" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="120" y1="652" x2="96" y2="652" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="120" y1="652" x2="144" y2="652" stroke="#7B6035" stroke-width="2.5"/>
    <!-- Front wheel -->
    <circle cx="240" cy="652" r="28" fill="url(#trainBody)"/>
    <circle cx="240" cy="652" r="28" fill="none" stroke="#5A4028" stroke-width="3"/>
    <circle cx="240" cy="652" r="10" fill="url(#brassDome)"/>
    <line x1="240" y1="652" x2="240" y2="628" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="240" y1="652" x2="240" y2="676" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="240" y1="652" x2="216" y2="652" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="240" y1="652" x2="264" y2="652" stroke="#7B6035" stroke-width="2.5"/>
  </g>

  <!-- ════════ MIDDLE CAR — double-9 (10-stop engine tile) ════════ -->
  <g filter="url(#tileShadow)">
    <rect x="345" y="480" width="200" height="120" rx="20" fill="url(#brassBorder)"/>
    <rect x="352" y="487" width="186" height="106" rx="16" fill="url(#tileFace)"/>
    <rect x="358" y="493" width="174" height="94" rx="12" fill="none" stroke="#C2A778" stroke-width="2" opacity="0.55"/>
    <line x1="442" y1="493" x2="442" y2="587" stroke="#9F8048" stroke-width="3"/>
    <line x1="448" y1="493" x2="448" y2="587" stroke="#9F8048" stroke-width="3"/>
    <circle cx="445" cy="493" r="5" fill="url(#brassBorder)"/>
    <circle cx="445" cy="587" r="5" fill="url(#brassBorder)"/>

    <!-- Pips: Double-9 (3×3 grid per half) -->
    <!-- Left half center (395, 540) -->
    <circle cx="367" cy="510" r="10" fill="url(#pip)"/>
    <circle cx="395" cy="510" r="10" fill="url(#pip)"/>
    <circle cx="423" cy="510" r="10" fill="url(#pip)"/>
    <circle cx="367" cy="540" r="10" fill="url(#pip)"/>
    <circle cx="395" cy="540" r="10" fill="url(#pip)"/>
    <circle cx="423" cy="540" r="10" fill="url(#pip)"/>
    <circle cx="367" cy="570" r="10" fill="url(#pip)"/>
    <circle cx="395" cy="570" r="10" fill="url(#pip)"/>
    <circle cx="423" cy="570" r="10" fill="url(#pip)"/>
    <!-- Right half center (495, 540) -->
    <circle cx="467" cy="510" r="10" fill="url(#pip)"/>
    <circle cx="495" cy="510" r="10" fill="url(#pip)"/>
    <circle cx="523" cy="510" r="10" fill="url(#pip)"/>
    <circle cx="467" cy="540" r="10" fill="url(#pip)"/>
    <circle cx="495" cy="540" r="10" fill="url(#pip)"/>
    <circle cx="523" cy="540" r="10" fill="url(#pip)"/>
    <circle cx="467" cy="570" r="10" fill="url(#pip)"/>
    <circle cx="495" cy="570" r="10" fill="url(#pip)"/>
    <circle cx="523" cy="570" r="10" fill="url(#pip)"/>
  </g>

  <!-- Middle car ventilator/hatch (a little character on top) -->
  <g>
    <rect x="420" y="458" width="50" height="22" rx="3" fill="url(#trainBody)"/>
    <rect x="425" y="463" width="40" height="3" fill="url(#brassDome)" opacity="0.8"/>
  </g>

  <!-- Middle car wheels -->
  <g>
    <circle cx="390" cy="652" r="28" fill="url(#trainBody)"/>
    <circle cx="390" cy="652" r="28" fill="none" stroke="#5A4028" stroke-width="3"/>
    <circle cx="390" cy="652" r="10" fill="url(#brassDome)"/>
    <line x1="390" y1="652" x2="390" y2="628" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="390" y1="652" x2="390" y2="676" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="390" y1="652" x2="366" y2="652" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="390" y1="652" x2="414" y2="652" stroke="#7B6035" stroke-width="2.5"/>
    <circle cx="500" cy="652" r="28" fill="url(#trainBody)"/>
    <circle cx="500" cy="652" r="28" fill="none" stroke="#5A4028" stroke-width="3"/>
    <circle cx="500" cy="652" r="10" fill="url(#brassDome)"/>
    <line x1="500" y1="652" x2="500" y2="628" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="500" y1="652" x2="500" y2="676" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="500" y1="652" x2="476" y2="652" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="500" y1="652" x2="524" y2="652" stroke="#7B6035" stroke-width="2.5"/>
  </g>

  <!-- ════════ LOCOMOTIVE — front car (RIGHT), shows double-12 ════════ -->
  <g filter="url(#tileShadow)">
    <rect x="590" y="465" width="260" height="150" rx="22" fill="url(#brassBorder)"/>
    <rect x="598" y="473" width="244" height="134" rx="18" fill="url(#tileFace)"/>
    <rect x="604" y="479" width="232" height="122" rx="14" fill="none" stroke="#C2A778" stroke-width="2" opacity="0.55"/>
    <line x1="717" y1="479" x2="717" y2="601" stroke="#9F8048" stroke-width="3"/>
    <line x1="723" y1="479" x2="723" y2="601" stroke="#9F8048" stroke-width="3"/>
    <circle cx="720" cy="479" r="6" fill="url(#brassBorder)"/>
    <circle cx="720" cy="601" r="6" fill="url(#brassBorder)"/>

    <!-- Pips: Double-12 (3 cols × 4 rows per half) -->
    <!-- Left half center (655, 540) -->
    <circle cx="620" cy="492" r="10" fill="url(#pip)"/>
    <circle cx="655" cy="492" r="10" fill="url(#pip)"/>
    <circle cx="690" cy="492" r="10" fill="url(#pip)"/>
    <circle cx="620" cy="524" r="10" fill="url(#pip)"/>
    <circle cx="655" cy="524" r="10" fill="url(#pip)"/>
    <circle cx="690" cy="524" r="10" fill="url(#pip)"/>
    <circle cx="620" cy="556" r="10" fill="url(#pip)"/>
    <circle cx="655" cy="556" r="10" fill="url(#pip)"/>
    <circle cx="690" cy="556" r="10" fill="url(#pip)"/>
    <circle cx="620" cy="588" r="10" fill="url(#pip)"/>
    <circle cx="655" cy="588" r="10" fill="url(#pip)"/>
    <circle cx="690" cy="588" r="10" fill="url(#pip)"/>
    <!-- Right half center (785, 540) -->
    <circle cx="750" cy="492" r="10" fill="url(#pip)"/>
    <circle cx="785" cy="492" r="10" fill="url(#pip)"/>
    <circle cx="820" cy="492" r="10" fill="url(#pip)"/>
    <circle cx="750" cy="524" r="10" fill="url(#pip)"/>
    <circle cx="785" cy="524" r="10" fill="url(#pip)"/>
    <circle cx="820" cy="524" r="10" fill="url(#pip)"/>
    <circle cx="750" cy="556" r="10" fill="url(#pip)"/>
    <circle cx="785" cy="556" r="10" fill="url(#pip)"/>
    <circle cx="820" cy="556" r="10" fill="url(#pip)"/>
    <circle cx="750" cy="588" r="10" fill="url(#pip)"/>
    <circle cx="785" cy="588" r="10" fill="url(#pip)"/>
    <circle cx="820" cy="588" r="10" fill="url(#pip)"/>
  </g>

  <!-- Locomotive CAB (back-left of locomotive top) -->
  <g>
    <!-- Roof overhang -->
    <path d="M 588 372 L 696 372 L 686 384 L 598 384 Z" fill="url(#trainBody)"/>
    <!-- Cab body -->
    <rect x="600" y="384" width="86" height="81" rx="4" fill="url(#trainBody)"/>
    <!-- Cab window -->
    <rect x="612" y="398" width="62" height="42" rx="3" fill="#EAD5A8" opacity="0.85"/>
    <!-- Cab door line -->
    <line x1="600" y1="430" x2="612" y2="430" stroke="#7B6035" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- Steam DOME (brass, between cab and smokestack) -->
  <g>
    <rect x="705" y="455" width="56" height="10" fill="url(#brassDome)"/>
    <path d="M 705 460 Q 705 425 733 425 Q 761 425 761 460 Z" fill="url(#brassDome)"/>
    <ellipse cx="733" cy="430" rx="5" ry="2" fill="#FFFBEE" opacity="0.55"/>
  </g>

  <!-- SMOKESTACK (top-front) -->
  <g>
    <!-- Tapered body -->
    <path d="M 783 465 L 783 360 L 768 348 L 768 340 L 832 340 L 832 348 L 817 360 L 817 465 Z" fill="url(#trainBody)"/>
    <!-- Top brass cap -->
    <rect x="762" y="332" width="76" height="10" rx="2" fill="url(#brassDome)"/>
  </g>

  <!-- COWCATCHER (pilot) at front of locomotive -->
  <g>
    <path d="M 850 605 L 902 605 L 893 670 L 842 670 Z" fill="url(#trainBody)"/>
    <line x1="857" y1="612" x2="849" y2="664" stroke="#7B6035" stroke-width="2"/>
    <line x1="868" y1="612" x2="862" y2="664" stroke="#7B6035" stroke-width="2"/>
    <line x1="879" y1="612" x2="876" y2="664" stroke="#7B6035" stroke-width="2"/>
    <line x1="890" y1="612" x2="889" y2="664" stroke="#7B6035" stroke-width="2"/>
  </g>

  <!-- HEADLIGHT (front-top of locomotive) -->
  <g>
    <circle cx="852" cy="500" r="16" fill="url(#trainBody)"/>
    <circle cx="852" cy="500" r="13" fill="url(#brassDome)"/>
    <circle cx="852" cy="500" r="9" fill="#FFF6D5"/>
  </g>

  <!-- LOCOMOTIVE WHEELS -->
  <g>
    <!-- Drive wheel (large, center) -->
    <circle cx="720" cy="644" r="36" fill="url(#trainBody)"/>
    <circle cx="720" cy="644" r="36" fill="none" stroke="#5A4028" stroke-width="3"/>
    <circle cx="720" cy="644" r="12" fill="url(#brassDome)"/>
    <line x1="720" y1="644" x2="720" y2="612" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="720" y1="644" x2="720" y2="676" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="720" y1="644" x2="688" y2="644" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="720" y1="644" x2="752" y2="644" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="720" y1="644" x2="697" y2="621" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="720" y1="644" x2="743" y2="667" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="720" y1="644" x2="697" y2="667" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="720" y1="644" x2="743" y2="621" stroke="#7B6035" stroke-width="2.5"/>

    <!-- Front wheel -->
    <circle cx="820" cy="652" r="28" fill="url(#trainBody)"/>
    <circle cx="820" cy="652" r="28" fill="none" stroke="#5A4028" stroke-width="3"/>
    <circle cx="820" cy="652" r="10" fill="url(#brassDome)"/>
    <line x1="820" y1="652" x2="820" y2="628" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="820" y1="652" x2="820" y2="676" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="820" y1="652" x2="796" y2="652" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="820" y1="652" x2="844" y2="652" stroke="#7B6035" stroke-width="2.5"/>

    <!-- Back wheel -->
    <circle cx="620" cy="652" r="28" fill="url(#trainBody)"/>
    <circle cx="620" cy="652" r="28" fill="none" stroke="#5A4028" stroke-width="3"/>
    <circle cx="620" cy="652" r="10" fill="url(#brassDome)"/>
    <line x1="620" y1="652" x2="620" y2="628" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="620" y1="652" x2="620" y2="676" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="620" y1="652" x2="596" y2="652" stroke="#7B6035" stroke-width="2.5"/>
    <line x1="620" y1="652" x2="644" y2="652" stroke="#7B6035" stroke-width="2.5"/>
  </g>
</svg>

name: MexicanTrain
options:
  bundleIdPrefix: com.kevin.mexicantrain
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "0.1"
targets:
  MexicanTrain:
    type: application
    platform: iOS
    sources:
      - path: MexicanTrain
    resources:
      - path: MexicanTrain/Resources/Assets.xcassets
        optional: true
      - path: MexicanTrain/Resources/Fonts
        optional: true
      - path: MexicanTrain/Vision/DominoDetector.mlpackage
        optional: true
    info:
      path: MexicanTrain/Resources/Info.plist
      properties:
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen:
          UIColorName: AccentColor
        NSCameraUsageDescription: "Photograph tiles to count pips automatically."
        NSLocalNetworkUsageDescription: "Mexican Train uses local networking so friends nearby can join your game live. Nothing leaves your devices."
        NSBonjourServices:
          - _mextrain-game._tcp
          - _mextrain-game._udp
        CFBundleURLTypes:
          - CFBundleURLName: com.kevin.mexicantrain.join
            CFBundleURLSchemes:
              - mextrain
        # Custom font files aren't bundled yet. When Rye-Regular.ttf and
        # SpecialElite-Regular.ttf are dropped into MexicanTrain/Resources/Fonts,
        # Fonts.registerBundledFonts() picks them up at launch via CTFontManager.
        # Add a UIAppFonts entry here at that point if we want the system font
        # discovery path too — the runtime path works either way.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kevin.mexicantrain
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  MexicanTrainTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MexicanTrainTests
    dependencies:
      - target: MexicanTrain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kevin.mexicantrain.tests
